<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f0f1a;
            color: #e0e0e0;
        }
        .navbar {
            background: #16213e !important;
            border-bottom: 1px solid rgba(233,69,96,0.4);
        }
        .navbar-brand {
            color: #e94560 !important;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .nav-link, .navbar-text { color: rgba(255,255,255,0.75) !important; }
        .nav-link:hover { color: #fff !important; }
        .btn-logout {
            border: 1px solid #e94560;
            color: #e94560;
            font-size: 0.85rem;
        }
        .btn-logout:hover { background: #e94560; color: #fff; }

        .stream-card {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .stream-card .card-header {
            background: rgba(233,69,96,0.15);
            border-bottom: 1px solid rgba(233,69,96,0.3);
            font-weight: 600;
            color: #e94560;
        }
        .ratio iframe { border: none; border-radius: 0 0 0.5rem 0.5rem; }

        .notif-card {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 0.75rem;
        }
        .notif-card .card-header {
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-weight: 600;
            color: #cdd6f4;
        }
        .notif-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 0.5rem;
            transition: background 0.2s;
        }
        .notif-item:hover { background: rgba(255,255,255,0.07); }
        .notif-time { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .notif-detail { font-size: 0.9rem; }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: #e94560;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.15rem 0.6rem;
            border-radius: 999px;
            letter-spacing: 0.08em;
        }
        .live-dot {
            width: 7px; height: 7px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .section-title {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
        <span class="navbar-brand">
            <i class="bi bi-shield-lock-fill me-2"></i>Admin Dashboard
        </span>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="navbar-text">
                <i class="bi bi-person-circle me-1"></i>{{ user }}
            </span>
            <a href="/about" class="nav-link">About</a>
            <a href="/logout" class="btn btn-logout btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>

<!-- Main content -->
<div class="container-fluid px-4 py-4">
    <div class="row g-4">

        <!-- Stream Column -->
        <div class="col-lg-8">
            <p class="section-title mb-2">Live Feed</p>
            <div class="stream-card">
                <div class="card-header d-flex align-items-center gap-2 py-2 px-3">
                    <i class="bi bi-camera-video-fill"></i>
                    Live Stream
                    <span class="live-badge ms-2">
                        <span class="live-dot"></span>LIVE
                    </span>
                </div>
                <div class="ratio ratio-16x9">
                    <iframe
                        src="https://www.youtube.com/embed/BQ1Cz-mFjeg?si=Latmuvz0vZdbEmZz&autoplay=0"
                        title="Live Stream"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </div>

        <!-- Notifications Column -->
        <div class="col-lg-4">
            <p class="section-title mb-2">Alerts</p>
            <div class="notif-card">
                <div class="card-header d-flex align-items-center gap-2 py-2 px-3">
                    <i class="bi bi-bell-fill"></i>
                    Recent Notifications
                    {% if notifications %}
                    <span class="badge bg-danger ms-auto">{{ notifications|length }}</span>
                    {% endif %}
                </div>
                <div class="card-body p-3 d-flex flex-column gap-2">
                    {% if notifications %}
                        {% for n in notifications %}
                        <div class="notif-item p-3">
                            <div class="d-flex align-items-start gap-2">
                                <i class="bi bi-{{ n.icon }} text-{{ n.color }} mt-1 flex-shrink-0"></i>
                                <div>
                                    <div class="notif-detail text-white">{{ n.detail }}</div>
                                    <div class="notif-time mt-1">
                                        <i class="bi bi-clock me-1"></i>{{ n.time }}
                                    </div>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    {% else %}
                        <p class="text-center text-muted py-3 mb-0">
                            <i class="bi bi-check-circle me-1"></i>No alerts
                        </p>
                    {% endif %}
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
